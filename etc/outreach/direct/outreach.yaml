"10": |

  Looking for digital artists to join a small pilot for printed art booklet subscriptions.

  I'm building a platform where fans can subscribe to artists they already follow and receive curated printed booklet drops at home. Think artist-curated zine/booklet releases, not generic merch or a print-on-demand storefront.

  This is best for artists with a clear visual style, an existing audience, and enough work to curate recurring releases. Digital illustrators, concept artists, fantasy/sci-fi artists, tattoo flash artists, and AI-native artists are especially relevant.

  The artist role is simple:
  - curate a release
  - share one creator page link with your audience
  - get early feedback from collectors

  The platform handles the product flow, printing, shipping, and checkout setup, so you do not need to manage inventory or fulfillment.

  I'm looking for 10-20 pilot creators and would love to talk with artists who want to test whether their audience would support recurring printed drops.

  If you're interested, reply here or DM me with a link to your work.

