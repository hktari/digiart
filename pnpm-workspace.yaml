packages:
  - apps/*
enablePrePostScripts: true
ignoreScripts: false
allowBuilds:
  "@nestjs/core": true
  "@prisma/client": true
  "@prisma/engines": true
  "@sentry/cli": true
  core-js: true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  msw: true
  prisma: true
  protobufjs: true
  sharp: true
  ssh2: true
  unrs-resolver: false
