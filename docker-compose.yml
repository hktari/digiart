# Infrastructure only — apps run via pnpm dev locally.
#
# Required env vars for apps/mvp and apps/pdf-worker when using MinIO:
#   REDIS_URL=redis://localhost:6379
#   STORAGE_DRIVER=s3
#   AWS_ENDPOINT_URL=http://localhost:9000
#   AWS_REGION=us-east-1
#   AWS_ACCESS_KEY_ID=minioadmin
#   AWS_SECRET_ACCESS_KEY=minioadmin
#   AWS_S3_BUCKET=booklets
#
# DATABASE_URL must point to your Neon (or local Postgres) instance.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/booklets &&
        mc anonymous set download local/booklets
      "
    restart: on-failure

volumes:
  redis_data:
  minio_data:
